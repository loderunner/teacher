services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: journey
      POSTGRES_USER: journey
      POSTGRES_PASSWORD: journey
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U journey -d journey']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
